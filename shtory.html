<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Бесконечный Каталог</title>
    <style>
        :root {
            --item-width: 280px; /* Ширина карточки */
            --item-height: 400px;
            --gap: 20px;
        }

        body {
            margin: 0;
            background: #0b0f1a;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden; /* Скрываем стандартный скролл */
            display: flex;
            align-items: center;
            height: 100vh;
        }

        /* Контейнер для всей ленты */
        .xg_track {
            display: flex;
            position: absolute;
            left: 0;
            gap: var(--gap);
            padding: 0 var(--gap);
            cursor: grab;
            user-select: none;
            will-change: transform;
        }

        .xg_track:active { cursor: grabbing; }

        /* Карточка товара */
        .xg_item {
            flex: 0 0 var(--item-width);
            height: var(--item-height);
            background: #161b22;
            border-radius: 20px;
            overflow: hidden;
            position: relative;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .xg_item:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 15px 40px rgba(37, 211, 102, 0.2);
        }

        .xg_item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            pointer-events: none;
        }

        /* Тень снизу для красоты */
        .xg_item::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; width: 100%; height: 50%;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
        }

        /* МОДАЛКА */
        .xg_modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            backdrop-filter: blur(10px);
        }

        .xg_modal_content {
            background: #1c212d;
            padding: 24px;
            border-radius: 24px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            border: 1px solid #30363d;
        }

        .xg_modal_content img {
            width: 100%;
            border-radius: 16px;
            margin-bottom: 20px;
        }

        .xg_btn {
            padding: 15px;
            width: 100%;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 10px;
            transition: opacity 0.2s;
        }

        .xg_btn:active { opacity: 0.8; }
        .xg_order { background: #25D366; color: #fff; }
        .xg_close { background: #30363d; color: #8b949e; }
    </style>
</head>
<body>

<div class="xg_track" id="xg_track">
    </div>

<div class="xg_modal" id="xg_modal">
    <div class="xg_modal_content">
        <img id="xg_modal_img" src="">
        <button class="xg_btn xg_order" id="xg_order_btn">Заказать в WhatsApp</button>
        <button class="xg_btn xg_close" onclick="xg_closeModal()">Закрыть</button>
    </div>
</div>

<script>
const xg_images = [
    "https://images.unsplash.com/photo-1582582429416-8a5d3c4a3d10?w=500",
    "https://images.unsplash.com/photo-1600585154340-be6161a56a0c?w=500",
    "https://images.unsplash.com/photo-1598300053653-8a77e0f0a8c2?w=500",
    "https://images.unsplash.com/photo-1616627456487-7d46f0c1e9f1?w=500",
    "https://images.unsplash.com/photo-1595526114035-0d45ed16cfbf?w=500",
    "https://images.unsplash.com/photo-1615874959474-d609969a20ed?w=500",
    "https://images.unsplash.com/photo-1586023492125-27b2c045efd7?w=500",
    "https://images.unsplash.com/photo-1598300042247-d088f8ab3a91?w=500"
];

const track = document.getElementById('xg_track');
const itemWidth = 280; // Ширина из CSS
const gap = 20; // Отступ из CSS
const totalWidth = itemWidth + gap;

// Создаем столько карточек, чтобы они перекрывали экран с запасом
const screenItems = Math.ceil(window.innerWidth / totalWidth) + 2;
let itemsData = []; // Храним данные о карточках

function createItem(index, isInitial = false) {
    const el = document.createElement('div');
    el.className = 'xg_item';
    
    const img = document.createElement('img');
    // Сначала идем по порядку, потом рандом
    const src = isInitial && index < xg_images.length ? xg_images[index] : xg_images[Math.floor(Math.random() * xg_images.length)];
    img.src = src;
    
    el.appendChild(img);
    el.onclick = () => xg_openModal(src);
    
    const obj = {
        el: el,
        x: index * totalWidth,
        src: src
    };
    
    el.style.transform = `translateX(${obj.x}px)`;
    track.appendChild(el);
    return obj;
}

// Инициализация ленты
for (let i = 0; i < screenItems; i++) {
    itemsData.push(createItem(i, true));
}

/* === БЕСКОНЕЧНАЯ ЛОГИКА === */
let scrollPos = 0;
let isDragging = false;
let startX, startScroll;

function updateItems() {
    itemsData.forEach(item => {
        // Если карточка ушла далеко влево — переносим вправо
        if (scrollPos + item.x < -totalWidth) {
            item.x += screenItems * totalWidth;
            const newSrc = xg_images[Math.floor(Math.random() * xg_images.length)];
            item.el.querySelector('img').src = newSrc;
            item.src = newSrc;
        }
        // Если ушла вправо (при обратной прокрутке) — переносим влево
        if (scrollPos + item.x > window.innerWidth + totalWidth) {
            item.x -= screenItems * totalWidth;
            const newSrc = xg_images[Math.floor(Math.random() * xg_images.length)];
            item.el.querySelector('img').src = newSrc;
            item.src = newSrc;
        }
        item.el.style.transform = `translateX(${item.x}px)`;
    });
    track.style.transform = `translateX(${scrollPos}px)`;
}

/* === УПРАВЛЕНИЕ === */
function onStart(e) {
    isDragging = true;
    startX = e.clientX || e.touches[0].clientX;
    startScroll = scrollPos;
}

function onMove(e) {
    if (!isDragging) return;
    const x = e.clientX || e.touches[0].clientX;
    const dist = x - startX;
    scrollPos = startScroll + dist;
    updateItems();
}

function onEnd() { isDragging = false; }

window.addEventListener('mousedown', onStart);
window.addEventListener('mousemove', onMove);
window.addEventListener('mouseup', onEnd);
window.addEventListener('touchstart', onStart);
window.addEventListener('touchmove', onMove);
window.addEventListener('touchend', onEnd);

/* === АВТО-АНИМАЦИЯ === */
function animate() {
    if (!isDragging) {
        scrollPos -= 1; // Скорость прокрутки
        updateItems();
    }
    requestAnimationFrame(animate);
}
animate();

/* === МОДАЛКА И WHATSAPP (БЕЗ ИЗМЕНЕНИЙ) === */
let xg_currentImg = "";
function xg_openModal(src){
    xg_currentImg = src;
    document.getElementById("xg_modal_img").src = src;
    document.getElementById("xg_modal").style.display = "flex";
}
function xg_closeModal(){
    document.getElementById("xg_modal").style.display = "none";
}
document.getElementById("xg_order_btn").onclick = function(){
    let text = encodeURIComponent("Хочу заказать товар: " + xg_currentImg);
    let phone = "77054046186"; 
    window.open(`https://wa.me/${phone}?text=${text}`, "_blank");
}
</script>
</body>
</html>
