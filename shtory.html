<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinity Cloud Catalog</title>
    <style>
        body {
            margin: 0;
            background: #05080a;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            touch-action: none; /* Важно для мобилок */
        }

        #xg_container {
            width: 100vw;
            height: 100vh;
            position: relative;
            cursor: grab;
            overflow: hidden;
        }

        .xg_item {
            position: absolute;
            width: 200px;
            height: 140px;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            transition: transform 0.3s ease, opacity 0.6s ease;
            opacity: 0; /* Для анимации появления */
            will-change: transform;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .xg_item.visible { opacity: 1; }

        .xg_item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            pointer-events: none;
        }

        /* МОДАЛКА */
        .xg_modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            backdrop-filter: blur(10px);
        }

        .xg_modal_content {
            background: #1a1f26;
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            max-width: 380px;
            width: 90%;
        }

        .xg_modal_content img { width: 100%; border-radius: 12px; margin-bottom: 15px; }

        .xg_btn {
            padding: 12px; width: 100%; border: none; border-radius: 10px;
            cursor: pointer; font-size: 16px; font-weight: bold; margin-bottom: 10px;
        }
        .xg_order { background: #25D366; color: white; }
        .xg_close { background: #333; color: #ccc; }
    </style>
</head>
<body>

<div id="xg_container"></div>

<div class="xg_modal" id="xg_modal">
    <div class="xg_modal_content">
        <img id="xg_modal_img" src="">
        <button class="xg_btn xg_order" id="xg_order_btn">Заказать в WhatsApp</button>
        <button class="xg_btn xg_close" onclick="xg_closeModal()">Закрыть</button>
    </div>
</div>

<script>
const xg_images = [
    "https://images.unsplash.com/photo-1582582429416-8a5d3c4a3d10?w=400",
    "https://images.unsplash.com/photo-1600585154340-be6161a56a0c?w=400",
    "https://images.unsplash.com/photo-1598300053653-8a77e0f0a8c2?w=400",
    "https://images.unsplash.com/photo-1616627456487-7d46f0c1e9f1?w=400",
    "https://images.unsplash.com/photo-1595526114035-0d45ed16cfbf?w=400",
    "https://images.unsplash.com/photo-1615874959474-d609969a20ed?w=400",
    "https://images.unsplash.com/photo-1586023492125-27b2c045efd7?w=400",
    "https://images.unsplash.com/photo-1598300042247-d088f8ab3a91?w=400"
];

const container = document.getElementById('xg_container');
const itemW = 220; // ширина + отступ
const itemH = 160; // высота + отступ

let offsetX = 0;
let offsetY = 0;
let items = [];

// Создаем сетку, которая чуть больше экрана
const rows = Math.ceil(window.innerHeight / itemH) + 2;
const cols = Math.ceil(window.innerWidth / itemW) + 2;

function init() {
    for (let r = -1; r < rows; r++) {
        for (let c = -1; c < cols; c++) {
            createItem(c * itemW, r * itemH);
        }
    }
}

function createItem(x, y) {
    const el = document.createElement('div');
    el.className = 'xg_item';
    const img = document.createElement('img');
    
    // Рандомная картинка
    const src = xg_images[Math.floor(Math.random() * xg_images.length)];
    img.src = src;
    el.appendChild(img);
    container.appendChild(el);

    const item = { el, x, y, src };
    items.push(item);

    // Анимация появления
    setTimeout(() => el.classList.add('visible'), Math.random() * 500);

    // Клик с защитой от сдвига
    let startClickX, startClickY;
    el.onmousedown = (e) => { startClickX = e.clientX; startClickY = e.clientY; };
    el.onmouseup = (e) => {
        if (Math.abs(e.clientX - startClickX) < 5 && Math.abs(e.clientY - startClickY) < 5) {
            xg_openModal(item.src);
        }
    };
    // Для мобильных
    el.ontouchstart = (e) => { 
        startClickX = e.touches[0].clientX; 
        startClickY = e.touches[0].clientY; 
    };
    el.ontouchend = (e) => {
        const endX = e.changedTouches[0].clientX;
        const endY = e.changedTouches[0].clientY;
        if (Math.abs(endX - startClickX) < 10 && Math.abs(endY - startClickY) < 10) {
            xg_openModal(item.src);
        }
    };
}

function update() {
    items.forEach(item => {
        let screenX = item.x + offsetX;
        let screenY = item.y + offsetY;

        // Бесконечное перемещение по X
        const fullW = cols * itemW;
        if (screenX < -itemW) item.x += fullW;
        if (screenX > window.innerWidth + itemW) item.x -= fullW;

        // Бесконечное перемещение по Y
        const fullH = rows * itemH;
        if (screenY < -itemH) item.y += fullH;
        if (screenY > window.innerHeight + itemH) item.y -= fullH;

        item.el.style.transform = `translate3d(${screenX}px, ${screenY}px, 0)`;
    });
}

/* === УПРАВЛЕНИЕ === */
let isDragging = false;
let lastX, lastY;

const startDrag = (e) => {
    isDragging = true;
    lastX = e.clientX || e.touches[0].clientX;
    lastY = e.clientY || e.touches[0].clientY;
    container.style.cursor = 'grabbing';
};

const moveDrag = (e) => {
    if (!isDragging) return;
    const x = e.clientX || (e.touches ? e.touches[0].clientX : 0);
    const y = e.clientY || (e.touches ? e.touches[0].clientY : 0);
    
    offsetX += x - lastX;
    offsetY += y - lastY;
    
    lastX = x;
    lastY = y;
    update();
};

const stopDrag = () => {
    isDragging = false;
    container.style.cursor = 'grab';
};

window.addEventListener('mousedown', startDrag);
window.addEventListener('mousemove', moveDrag);
window.addEventListener('mouseup', stopDrag);
window.addEventListener('touchstart', startDrag);
window.addEventListener('touchmove', moveDrag);
window.addEventListener('touchend', stopDrag);

/* === АВТО-ДВИЖЕНИЕ (на искосок) === */
function autoAnimate() {
    if (!isDragging) {
        offsetX -= 0.3;
        offsetY -= 0.2;
        update();
    }
    requestAnimationFrame(autoAnimate);
}

/* === МОДАЛКА === */
let xg_currentImg = "";
function xg_openModal(src){
    xg_currentImg = src;
    document.getElementById("xg_modal_img").src = src;
    document.getElementById("xg_modal").style.display = "flex";
}
function xg_closeModal(){
    document.getElementById("xg_modal").style.display = "none";
}
document.getElementById("xg_order_btn").onclick = function(){
    let text = encodeURIComponent("Заказ товара: " + xg_currentImg);
    window.open(`https://wa.me/77000000000?text=${text}`, "_blank");
}

init();
autoAnimate();
</script>
</body>
</html>
