<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Infinite Glossy Catalog</title>
    <style>
        :root {
            --card-w: 260px;
            --card-h: 380px;
            --gap: 25px;
            --accent: #25D366;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background: #05070a;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        #viewport {
            width: 100vw;
            height: 100vh;
            position: relative;
            cursor: grab;
            overflow: hidden;
        }

        #viewport:active { cursor: grabbing; }

        #world {
            position: absolute;
            top: 0; left: 0;
            will-change: transform;
        }

        .xg_item {
            position: absolute;
            width: var(--card-w);
            height: var(--card-h);
            background: #111;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.7);
            transition: transform 0.6s cubic-bezier(0.165, 0.84, 0.44, 1), opacity 0.8s ease;
            opacity: 0;
            transform: scale(0.8) translateY(100px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* Анимация появления */
        .xg_item.visible {
            opacity: 1;
            transform: scale(1) translateY(0);
        }

        /* ЭФФЕКТ БЛИКА (GLOSS) */
        .xg_item::before {
            content: '';
            position: absolute;
            top: 0; left: -150%;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(255, 255, 255, 0.2),
                transparent
            );
            transform: skewX(-25deg);
            transition: 0.75s;
            z-index: 2;
        }

        .xg_item:hover::before {
            left: 150%;
        }

        .xg_item:hover {
            border-color: var(--accent);
            box-shadow: 0 0 30px rgba(37, 211, 102, 0.2);
            z-index: 10;
        }

        .xg_item img {
            width: 100%; height: 100%;
            object-fit: cover;
            pointer-events: none;
            transition: transform 0.5s ease;
        }

        .xg_item:hover img {
            transform: scale(1.1);
        }

        /* МОДАЛКА */
        .xg_modal {
            position: fixed;
            top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.92);
            display: none; align-items: center; justify-content: center;
            z-index: 9999; backdrop-filter: blur(12px);
        }

        .xg_modal_content {
            background: #161a23; padding: 25px; border-radius: 30px;
            text-align: center; max-width: 340px; width: 90%;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .xg_modal_content img { width: 100%; border-radius: 15px; margin-bottom: 20px; }

        .xg_btn {
            padding: 16px; width: 100%; border: none; border-radius: 14px;
            cursor: pointer; font-size: 16px; font-weight: 600; margin-bottom: 12px;
            transition: 0.3s;
        }
        .xg_order { background: var(--accent); color: #fff; }
        .xg_order:hover { background: #1ebe57; transform: translateY(-2px); }
        .xg_close { background: #2a2f3a; color: #a0a6b3; }
    </style>
</head>
<body>

<div id="viewport">
    <div id="world"></div>
</div>

<div class="xg_modal" id="xg_modal">
    <div class="xg_modal_content">
        <img id="xg_modal_img" src="">
        <button class="xg_btn xg_order" id="xg_order_btn">Заказать через WhatsApp</button>
        <button class="xg_btn xg_close" onclick="closeModal()">Закрыть</button>
    </div>
</div>

<script>
const IMAGES = [
    "https://images.unsplash.com/photo-1582582429416-8a5d3c4a3d10?w=500",
    "https://images.unsplash.com/photo-1600585154340-be6161a56a0c?w=500",
    "https://images.unsplash.com/photo-1598300053653-8a77e0f0a8c2?w=500",
    "https://images.unsplash.com/photo-1616627456487-7d46f0c1e9f1?w=500",
    "https://images.unsplash.com/photo-1595526114035-0d45ed16cfbf?w=500",
    "https://images.unsplash.com/photo-1615874959474-d609969a20ed?w=500",
    "https://images.unsplash.com/photo-1586023492125-27b2c045efd7?w=500",
    "https://images.unsplash.com/photo-1524758631624-e2822e304c36?w=500"
];

const world = document.getElementById('world');
const cardW = 260, cardH = 380, gap = 25;
const stepX = cardW + gap, stepY = cardH + gap;

const cols = Math.ceil(window.innerWidth / stepX) + 2;
const rows = Math.ceil(window.innerHeight / stepY) + 2;
const items = [];

// Создание сетки
for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
        const el = document.createElement('div');
        el.className = 'xg_item';
        const img = document.createElement('img');
        // Рандомный выбор из списка для разнообразия
        const src = IMAGES[Math.floor(Math.random() * IMAGES.length)];
        img.src = src;
        el.appendChild(img);
        
        el.addEventListener('click', () => {
            if (isMoving) return;
            openModal(src);
        });

        world.appendChild(el);

        const item = { el, x: c * stepX, y: r * stepY, src: src };
        items.push(item);

        setTimeout(() => el.classList.add('visible'), (r + c) * 70);
    }
}

let worldX = 0, worldY = 0;
let startX, startY, isDragging = false, isMoving = false;

function update() {
    items.forEach(item => {
        let realX = item.x + worldX;
        let realY = item.y + worldY;

        const fullW = cols * stepX;
        const fullH = rows * stepY;

        if (realX < -stepX) item.x += fullW;
        if (realX > window.innerWidth + stepX) item.x -= fullW;
        if (realY < -stepY) item.y += fullH;
        if (realY > window.innerHeight + stepY) item.y -= fullH;

        item.el.style.transform = `translate3d(${item.x}px, ${item.y}px, 0)`;
    });
    world.style.transform = `translate3d(${worldX}px, ${worldY}px, 0)`;
}

update();

/* === EVENTS (MOUSE & TOUCH) === */
const handleStart = (e) => {
    isDragging = true;
    isMoving = false;
    const t = e.touches ? e.touches[0] : e;
    startX = t.clientX - worldX;
    startY = t.clientY - worldY;
};

const handleMove = (e) => {
    if (!isDragging) return;
    isMoving = true;
    const t = e.touches ? e.touches[0] : e;
    worldX = t.clientX - startX;
    worldY = t.clientY - startY;
    update();
};

const handleEnd = () => {
    isDragging = false;
    setTimeout(() => isMoving = false, 100);
};

window.addEventListener('mousedown', handleStart);
window.addEventListener('mousemove', handleMove);
window.addEventListener('mouseup', handleEnd);
window.addEventListener('touchstart', handleStart, {passive: false});
window.addEventListener('touchmove', handleMove, {passive: false});
window.addEventListener('touchend', handleEnd);

/* === MODAL & BUSINESS === */
let currentImg = "";
function openModal(src) {
    currentImg = src;
    document.getElementById('xg_modal_img').src = src;
    document.getElementById('xg_modal').style.display = 'flex';
}
function closeModal() {
    document.getElementById('xg_modal').style.display = 'none';
}
document.getElementById("xg_order_btn").onclick = function(){
    let phone = "77000000000"; // ВАШ НОМЕР
    let text = encodeURIComponent("Здравствуйте! Хочу заказать товар: " + currentImg);
    window.open(`https://wa.me/${phone}?text=${text}`, "_blank");
}
</script>
</body>
</html>
