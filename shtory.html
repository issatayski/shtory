<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Infinite 2D Catalog</title>
    <style>
        :root {
            --card-w: 250px;
            --card-h: 350px;
            --gap: 20px;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background: #05070a;
            font-family: sans-serif;
        }

        /* Контейнер-сцена */
        #viewport {
            width: 100vw;
            height: 100vh;
            position: relative;
            cursor: grab;
            perspective: 1000px;
        }

        #viewport:active { cursor: grabbing; }

        /* Мир, в котором лежат картинки */
        #world {
            position: absolute;
            top: 0; left: 0;
            will-change: transform;
        }

        .xg_item {
            position: absolute;
            width: var(--card-w);
            height: var(--card-h);
            background: #1a1a1a;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.5s ease;
            opacity: 0;
            transform: scale(0.5) translateY(50px);
            user-select: none;
            border: 1px solid rgba(255,255,255,0.05);
        }

        /* Класс для анимации появления */
        .xg_item.visible {
            opacity: 1;
            transform: scale(1) translateY(0);
        }

        .xg_item:hover {
            z-index: 100 !important;
            border-color: #25D366;
            box-shadow: 0 0 20px rgba(37, 211, 102, 0.3);
        }

        .xg_item img {
            width: 100%; height: 100%;
            object-fit: cover;
            pointer-events: none; /* Чтобы не мешать Drag-событиям */
        }

        /* МОДАЛКА */
        .xg_modal {
            position: fixed;
            top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.9);
            display: none; align-items: center; justify-content: center;
            z-index: 9999; backdrop-filter: blur(8px);
        }

        .xg_modal_content {
            background: #111; padding: 20px; border-radius: 20px;
            text-align: center; max-width: 320px; width: 90%;
            border: 1px solid #333;
        }

        .xg_modal_content img { width: 100%; border-radius: 12px; margin-bottom: 15px; }

        .xg_btn {
            padding: 14px; width: 100%; border: none; border-radius: 10px;
            cursor: pointer; font-size: 16px; font-weight: bold; margin-bottom: 10px;
        }
        .xg_order { background: #25D366; color: #fff; }
        .xg_close { background: #222; color: #bbb; }
    </style>
</head>
<body>

<div id="viewport">
    <div id="world"></div>
</div>

<div class="xg_modal" id="xg_modal">
    <div class="xg_modal_content">
        <img id="xg_modal_img" src="">
        <button class="xg_btn xg_order" id="xg_order_btn">WhatsApp Заказ</button>
        <button class="xg_btn xg_close" onclick="closeModal()">Закрыть</button>
    </div>
</div>

<script>
const IMAGES = [
    "https://images.unsplash.com/photo-1582582429416-8a5d3c4a3d10?w=400",
    "https://images.unsplash.com/photo-1600585154340-be6161a56a0c?w=400",
    "https://images.unsplash.com/photo-1598300053653-8a77e0f0a8c2?w=400",
    "https://images.unsplash.com/photo-1616627456487-7d46f0c1e9f1?w=400",
    "https://images.unsplash.com/photo-1595526114035-0d45ed16cfbf?w=400",
    "https://images.unsplash.com/photo-1615874959474-d609969a20ed?w=400"
];

const world = document.getElementById('world');
const cardW = 250, cardH = 350, gap = 25;
const stepX = cardW + gap, stepY = cardH + gap;

// Определяем размер сетки (чуть больше экрана для бесшовности)
const cols = Math.ceil(window.innerWidth / stepX) + 2;
const rows = Math.ceil(window.innerHeight / stepY) + 2;
const items = [];

// Создание сетки
for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
        const el = document.createElement('div');
        el.className = 'xg_item';
        const img = document.createElement('img');
        const src = IMAGES[(r * cols + c) % IMAGES.length];
        img.src = src;
        el.appendChild(img);
        
        // Клик теперь работает корректно
        el.addEventListener('click', (e) => {
            if (isMoving) return; // Не открывать при перетаскивании
            openModal(src);
        });

        world.appendChild(el);

        const item = {
            el,
            x: c * stepX,
            y: r * stepY,
            src: src
        };
        items.push(item);

        // Анимация появления с задержкой
        setTimeout(() => el.classList.add('visible'), (r + c) * 100);
    }
}

/* === ЛОГИКА ДВИЖЕНИЯ === */
let worldX = 0, worldY = 0;
let startX, startY, isDragging = false, isMoving = false;

function update() {
    items.forEach(item => {
        let realX = item.x + worldX;
        let realY = item.y + worldY;

        const fullW = cols * stepX;
        const fullH = rows * stepY;

        // Бесконечное зацикливание X
        if (realX < -stepX) item.x += fullW;
        if (realX > window.innerWidth + stepX) item.x -= fullW;
        
        // Бесконечное зацикливание Y
        if (realY < -stepY) item.y += fullH;
        if (realY > window.innerHeight + stepY) item.y -= fullH;

        item.el.style.transform = `translate3d(${item.x}px, ${item.y}px, 0)`;
    });
    world.style.transform = `translate3d(${worldX}px, ${worldY}px, 0)`;
}

// Первичная отрисовка
update();

/* === EVENTS === */
const start = (e) => {
    isDragging = true;
    isMoving = false;
    const t = e.touches ? e.touches[0] : e;
    startX = t.clientX - worldX;
    startY = t.clientY - worldY;
};

const move = (e) => {
    if (!isDragging) return;
    isMoving = true;
    const t = e.touches ? e.touches[0] : e;
    worldX = t.clientX - startX;
    worldY = t.clientY - startY;
    update();
};

const end = () => {
    isDragging = false;
    // Небольшой тайм-аут, чтобы клик не срабатывал сразу после Drag
    setTimeout(() => isMoving = false, 50);
};

window.addEventListener('mousedown', start);
window.addEventListener('mousemove', move);
window.addEventListener('mouseup', end);
window.addEventListener('touchstart', start);
window.addEventListener('touchmove', move);
window.addEventListener('touchend', end);

/* === MODAL & WHATSAPP === */
let currentImg = "";
function openModal(src) {
    currentImg = src;
    document.getElementById('xg_modal_img').src = src;
    document.getElementById('xg_modal').style.display = 'flex';
}
function closeModal() {
    document.getElementById('xg_modal').style.display = 'none';
}
document.getElementById("xg_order_btn").onclick = function(){
    let text = encodeURIComponent("Заказ товара: " + currentImg);
    window.open(`https://wa.me/77000000000?text=${text}`, "_blank");
}
</script>
</body>
</html>
