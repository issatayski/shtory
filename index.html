<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ролл-шторы</title>

<style>
body{margin:0;font-family:Arial}

/* HERO */
.hero{
  padding:70px 20px;
  text-align:center;
  background:#f5f5f5;
}

.btn{
  background:#0DB14B;
  color:#fff;
  padding:12px 20px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

/* QUIZ */
#quizModal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  justify-content:center;
  align-items:center;
  z-index:99999;
}

.quiz-box{
  background:#fff;
  width:90%;
  max-width:420px;
  padding:20px;
  border-radius:14px;
}

.quiz-step{display:none}
.quiz-step.active{display:block}

.quiz-box button{
  width:100%;
  margin-top:10px;
  padding:12px;
  background:#0DB14B;
  color:#fff;
  border:none;
  border-radius:8px;
}

.quiz-actions{
  display:flex;
  gap:10px;
  margin-top:10px;
}

.cancel{background:#999 !important}

/* GALLERY */
.gallery{
  padding:60px 20px;
}

.tabs{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:20px;
}

.tabs button{
  padding:10px 15px;
  border:none;
  background:#eee;
  border-radius:6px;
  cursor:pointer;
}

.tabs .active{
  background:#0DB14B;
  color:#fff;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:15px;
}

.item img{
  width:100%;
  height:200px;
  object-fit:cover;
  border-radius:10px;
  cursor:pointer;
}

/* LIGHTBOX */
.lightbox{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.8);
  justify-content:center;
  align-items:center;
}

.lightbox img{
  max-width:90%;
  max-height:90%;
  border-radius:10px;
}
</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
  <h1>Ролл-шторы</h1>
  <p>Замер бесплатно • Установка 2 дня</p>
  <button class="btn" onclick="openQuiz()">Получить расчет</button>
</section>

<!-- QUIZ -->
<div id="quizModal">
  <div class="quiz-box">

    <span onclick="closeQuiz()" style="float:right;cursor:pointer">✖</span>

    <div class="quiz-step active">
      <h3>Где?</h3>
      <button onclick="next('Квартира')">Квартира</button>
      <button onclick="next('Дом')">Дом</button>
    </div>

    <div class="quiz-step">
      <h3>Тип?</h3>
      <button onclick="next('Ролл')">Ролл</button>
      <button onclick="next('Жалюзи')">Жалюзи</button>
    </div>

    <div class="quiz-step">
      <h3>Размер?</h3>
      <button onclick="next('Маленькое')">Маленькое</button>
      <button onclick="next('Большое')">Большое</button>
    </div>

    <div class="quiz-step">
      <h3>Телефон</h3>
      <input id="phone" placeholder="+7..." style="width:100%;padding:10px;margin-top:10px">

      <div class="quiz-actions">
        <button onclick="send()">Отправить</button>
        <button class="cancel" onclick="closeQuiz()">Отмена</button>
      </div>
    </div>

  </div>
</div>

<!-- GALLERY -->
<section class="gallery">
  <h2>Галерея</h2>

  <div class="tabs">
    <button class="active" onclick="filter('catalog')">Каталог</button>
    <button onclick="filter('portfolio')">Портфолио</button>
    <button onclick="filter('inspiration')">Интерьер</button>
  </div>

  <div class="grid">

    <div class="item catalog"><img src="https://via.placeholder.com/400x300" onclick="openImg(this)"></div>
    <div class="item catalog"><img src="https://via.placeholder.com/400x300" onclick="openImg(this)"></div>

    <div class="item portfolio"><img src="https://via.placeholder.com/400x300" onclick="openImg(this)"></div>
    <div class="item portfolio"><img src="https://via.placeholder.com/400x300" onclick="openImg(this)"></div>

    <div class="item inspiration"><img src="https://via.placeholder.com/400x300" onclick="openImg(this)"></div>

  </div>
</section>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeImg()">
  <img id="bigImg">
</div>

<script>
let step=0;
let data=[];

/* QUIZ */
function openQuiz(){
  document.getElementById('quizModal').style.display='flex';
}

function closeQuiz(){
  document.getElementById('quizModal').style.display='none';
}

function next(val){
  data.push(val);
  let s=document.querySelectorAll('.quiz-step');
  s[step].classList.remove('active');
  step++;
  if(s[step]) s[step].classList.add('active');
}

function send(){
  let phone=document.getElementById('phone').value;
  window.open("https://wa.me/77770000000?text="+encodeURIComponent(data.join(' | ')+" "+phone));
}

/* GALLERY */
function filter(type){
  let items=document.querySelectorAll('.item');
  items.forEach(i=>{
    i.style.display=i.classList.contains(type)?'block':'none';
  });
}

function openImg(img){
  document.getElementById('lightbox').style.display='flex';
  document.getElementById('bigImg').src=img.src;
}

function closeImg(){
  document.getElementById('lightbox').style.display='none';
}
</script>

</body>
</html>
