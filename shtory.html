<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Каталог работ</title>
    <style>
        /* HEADER STYLES */
        .header {
            position: fixed; top: 0; left: 0; width: 100%; height: 70px;
            background: #ffffff; box-shadow: 0 2px 15px rgba(0,0,0,0.05);
            z-index: 1000; display: flex; align-items: center;
        }
        .header-wrap { display: flex; justify-content: space-between; align-items: center; width: 100%; padding: 0 20px; }
        .logo { display: flex; align-items: center; gap: 15px; text-decoration: none; }
        .logo-img { height: 70px; transition: 0.3s; }
        .logo-slogan { font-size: 18px; color: #0c5b71; line-height: 1.2; max-width: 250px; font-weight: 600; }
        
        .nav-desktop { display: flex; gap: 25px; }
        .nav-desktop a { text-decoration: none; color: #1E1E1E; font-weight: 500; font-size: 14px; }
        .btn-call { background: #1E1E1E; color: #fff !important; padding: 8px 18px; border-radius: 20px; }

        /* MOBILE MENU */
        .menu-toggle { display: none; width: 30px; height: 20px; position: relative; cursor: pointer; z-index: 1002; }
        .menu-toggle span { display: block; width: 100%; height: 2px; background: #1e1e1e; position: absolute; transition: 0.3s; }
        .menu-toggle span:first-child { top: 0; }
        .menu-toggle span:last-child { bottom: 0; }
        .mobile-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #fff; z-index: 1001; display: flex; justify-content: center;
            align-items: center; transform: translateY(-100%); transition: 0.5s ease;
        }
        .mobile-overlay.active { transform: translateY(0); }
        .mobile-nav-list { display: flex; flex-direction: column; gap: 30px; text-align: center; }
        .mobile-nav-list a { font-size: 24px; text-decoration: none; color: #1e1e1e; font-weight: 700; }

        @media (max-width: 1024px) {
            .nav-desktop { display: none; }
            .menu-toggle { display: block; }
        }

        /* CATALOG CANVAS */
        :root { --card-w: 260px; --card-h: 380px; --gap: 30px; --accent: #25D366; }
        body { margin: 0; background: #f4f4f4; overflow: hidden; }
        
        #viewport { width: 100vw; height: 100vh; position: relative; cursor: grab; }
        #world { position: absolute; top: 0; left: 0; will-change: transform; }

        .xg_item {
            position: absolute; width: var(--card-w); height: var(--card-h);
            background: #fff; border-radius: 12px; overflow: hidden;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1); opacity: 0;
            border: 1px solid rgba(0,0,0,0.05); transition: border-color 0.3s;
        }
        .xg_item:hover { border-color: var(--accent); }
        .xg_item img { width: 100%; height: 85%; object-fit: cover; pointer-events: none; }
        
        /* ТЕКСТ НАД КАРТИНКОЙ В ЦЕНТРЕ */
        .card-title {
            position: absolute; top: 0; left: 0; width: 100%; height: 85%;
            display: flex; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.2); color: #fff; font-weight: bold;
            font-size: 20px; text-shadow: 1px 1px 5px rgba(0,0,0,0.5);
            pointer-events: none;
        }
        .card-footer { height: 15%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 600; color: #333; }

        /* MODAL */
        .xg_modal {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center;
            z-index: 9999; backdrop-filter: blur(5px);
        }
        .xg_modal_content { background: #fff; padding: 20px; border-radius: 20px; text-align: center; max-width: 340px; width: 90%; }
        .xg_modal_content img { width: 100%; border-radius: 10px; margin-bottom: 15px; }
        .xg_btn { padding: 16px; width: 100%; border: none; border-radius: 10px; cursor: pointer; font-size: 16px; font-weight: 600; margin-bottom: 10px; }
        .xg_order { background: var(--accent); color: #fff; }
        .xg_close { background: #eee; color: #666; }

        /* STICKY BOTTOM */
        .sticky { position: fixed; bottom: 0; width: 100%; display: flex; z-index: 999; }
        .sticky a { flex: 1; text-align: center; padding: 15px; color: #fff; text-decoration: none; font-size: 20px; }
        .call { background: #1E1E1E; }
        .wa { background: #0DB14B; }
        @media(min-width: 1024px) { .sticky { display: none; } }
    </style>
</head>
<body>

<header class="header">
    <div class="header-wrap">
        <a href="/" class="logo">
            <img src="./img/logotip.png" alt="Logo" class="logo-img">
            <span class="logo-slogan">Стиль в каждом окне</span>
        </a>
        <nav class="nav-desktop">
            <a href="./index.html#quiz">Подбор дизайна</a>
            <a href="./index.html#gallery">Галерея</a>
            <a href="./index.html#contact">Контакты</a>
            <a href="tel:+77000000000" class="btn-call">Позвонить</a>
        </nav>
        <div class="menu-toggle" id="menuToggle">
            <span></span><span style="top:9px"></span><span style="bottom:0"></span>
        </div>
    </div>
    <div class="mobile-overlay" id="mobileMenu">
        <nav class="mobile-nav-list">
            <a href="./index.html#quiz" onclick="toggleMenu()">Подбор дизайна</a>
            <a href="./index.html#gallery" onclick="toggleMenu()">Галерея</a>
            <a href="./index.html#contact" onclick="toggleMenu()">Контакты</a>
            <a href="tel:+77000000000" style="color:#0DB14B">Позвонить</a>
        </nav>
    </div>
</header>

<div id="viewport">
    <div id="world"></div>
</div>

<div class="xg_modal" id="xg_modal">
    <div class="xg_modal_content">
        <h3 id="xg_modal_title">Название</h3>
        <img id="xg_modal_img" src="">
        <button class="xg_btn xg_order" id="xg_order_btn">WhatsApp Заказ</button>
        <button class="xg_btn xg_close" onclick="closeModal()">Закрыть</button>
    </div>
</div>

<script>
// ДАННЫЕ КАТАЛОГА
// ДАННЫЕ КАТАЛОГА
const CATALOG = [
    { src: "./catalog/2roll.jpg", title: "2-Roll" },
    { src: "./catalog/day_nite.jpg", title: "День-Ночь" },
    { src: "./catalog/duet2.jpg", title: "Дуэт" },
    { src: "./catalog/duet2back.jpg", title: "Дуэт Back" },
    { src: "./catalog/mini_roll.jpg", title: "Мини Ролл" },
    { src: "./catalog/mini_roll_shtor.jpg", title: "Мини Шторы" },
    { src: "./catalog/only_mini_roll.jpg", title: "Классик Ролл" },
    { src: "./catalog/zebra_day_nite.jpg", title: "Зебра" }
];

const world = document.getElementById('world');

// АДАПТИВНЫЕ ПАРАМЕТРЫ
const isMobile = window.innerWidth <= 768;
const cardW = isMobile ? window.innerWidth * 0.8 : 260; // На мобильных карта занимает 80% ширины
const cardH = isMobile ? (cardW * 1.4) : 380; // Сохраняем пропорции
const gap = isMobile ? 20 : 30;

const stepX = cardW + gap;
const stepY = cardH + gap;

// Умное количество колонок: 2 для мобильных, 4-5 для ПК
const colsCount = isMobile ? 2 : 4; 
const rowsCount = Math.ceil(CATALOG.length / colsCount);
const items = [];

// Принудительно устанавливаем размеры в CSS переменные для корректного отображения
document.documentElement.style.setProperty('--card-w', cardW + 'px');
document.documentElement.style.setProperty('--card-h', cardH + 'px');
document.documentElement.style.setProperty('--gap', gap + 'px');

// СОЗДАНИЕ КАРТОЧЕК
CATALOG.forEach((data, index) => {
    const r = Math.floor(index / colsCount);
    const c = index % colsCount;

    const el = document.createElement('div');
    el.className = 'xg_item';
    el.innerHTML = `
        <img src="${data.src}">
        <div class="card-title">${data.title}</div>
        <div class="card-footer">Подробнее</div>
    `;
    
    el.addEventListener('click', () => {
        if (isMoving) return;
        openModal(data.src, data.title);
    });

    world.appendChild(el);
    items.push({ el, x: c * stepX, y: r * stepY, src: data.src, title: data.title });
    setTimeout(() => el.style.opacity = "1", index * 50);
});

let worldX = 0, worldY = 0;
let startX, startY, isDragging = false, isMoving = false;

// Полные размеры сетки для бесконечного цикла
const gridWidth = colsCount * stepX;
const gridHeight = rowsCount * stepY;

function update() {
    items.forEach(item => {
        let realX = item.x + worldX;
        let realY = item.y + worldY;

        // Корректный бесконечный цикл для любых экранов
        if (realX < -stepX) item.x += gridWidth;
        if (realX > window.innerWidth + (gridWidth - window.innerWidth)) item.x -= gridWidth;
        
        if (realY < -stepY) item.y += gridHeight;
        if (realY > window.innerHeight + (gridHeight - window.innerHeight)) item.y -= gridHeight;

        item.el.style.transform = `translate3d(${item.x}px, ${item.y}px, 0)`;
    });
    world.style.transform = `translate3d(${worldX}px, ${worldY}px, 0)`;
}
update();

/* INTERACTION */
const handleStart = (e) => {
    isDragging = true; isMoving = false;
    const t = e.touches ? e.touches[0] : e;
    startX = t.clientX - worldX; startY = t.clientY - worldY;
};
const handleMove = (e) => {
    if (!isDragging) return;
    isMoving = true;
    const t = e.touches ? e.touches[0] : e;
    worldX = t.clientX - startX; worldY = t.clientY - startY;
    update();
};
const handleEnd = () => { isDragging = false; setTimeout(() => isMoving = false, 50); };

window.addEventListener('mousedown', handleStart);
window.addEventListener('mousemove', handleMove);
window.addEventListener('mouseup', handleEnd);
window.addEventListener('touchstart', handleStart, {passive: false});
window.addEventListener('touchmove', handleMove, {passive: false});
window.addEventListener('touchend', handleEnd);

/* MODAL & WHATSAPP */
let currentOrder = { src: "", title: "" };
function openModal(src, title) {
    currentOrder = { src, title };
    document.getElementById('xg_modal_img').src = src;
    document.getElementById('xg_modal_title').innerText = title;
    document.getElementById('xg_modal').style.display = 'flex';
}
function closeModal() { document.getElementById('xg_modal').style.display = 'none'; }

document.getElementById("xg_order_btn").onclick = function() {
    const phone = "77754046186";
    // Формируем ссылку на фото для WhatsApp
    const imgUrl = window.location.origin + "/" + currentOrder.src.replace("./", "");
    const text = encodeURIComponent(`Здравствуйте! Хочу заказать: *${currentOrder.title}*\nФото: ${imgUrl}`);
    window.open(`https://wa.me/${phone}?text=${text}`, "_blank");
}

/* MENU */
const menuToggle = document.getElementById('menuToggle');
const mobileMenu = document.getElementById('mobileMenu');
function toggleMenu() {
    menuToggle.classList.toggle('active');
    mobileMenu.classList.toggle('active');
}
menuToggle.addEventListener('click', toggleMenu);
</script>

<div class="sticky">
    <a href="tel:+77000000000" class="call">📞 Позвонить</a>
    <a href="https://wa.me/77754046186" class="wa">💬 WhatsApp</a>
</div>

</body>
</html>
