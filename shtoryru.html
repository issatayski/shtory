<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Каталог жалюзи и ролл-штор: фото работ и виды систем</title>
<meta name="description" content="Фотогалерея наших работ: шторы день-ночь, системы Зебра, Мини-роллы и классические жалюзи. Выберите идеальное решение для вашего окна.">
	<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <style>
        /* HEADER STYLES */
        .header {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 70px;
    background: #ffffff;
    box-shadow: 0 2px 15px rgba(0,0,0,0.05);
    z-index: 1000;
    display: flex;
    align-items: center;
}

.header-wrap {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    padding: 0 20px;
}

.logo {
    display: flex;
    align-items: center;
    gap: 15px;
    text-decoration: none;
}

.logo-img {
    height: 70px;
    width: auto;
    display: block;
}

.logo-img:hover {
    transform: scale(1.05);
}

@media (max-width: 768px) {
    .logo-img {
        height: 60px;
    }
}

.logo strong { font-size: 20px; font-family: 'Montserrat'; }
.logo-slogan {
    font-size: 20px;
    color: #0c5b71;
    line-height: 1.2;
    max-width: 250px;
}

@media (max-width: 768px) {
    .logo {
        gap: 8px;
    }
    .logo-slogan {
        font-size: 18px;
        display: block;
    }
}

/* DESKTOP NAV */
.nav-desktop { display: flex; align-items: center; gap: 25px; }
.nav-desktop a {
    text-decoration: none;
    color: #1E1E1E;
    font-weight: 500;
    font-size: 14px;
    transition: 0.3s;
}
.nav-desktop a:hover { color: #0DB14B; }

.btn-call {
    background: #1E1E1E;
    color: #fff !important;
    padding: 8px 18px;
    border-radius: 20px;
    font-size: 13px !important;
}

/* MOBILE TOGGLE (HAMBURGER) */
.menu-toggle {
    display: none;
    width: 30px;
    height: 20px;
    position: relative;
    cursor: pointer;
    z-index: 1002;
}

.menu-toggle span {
    display: block;
    width: 100%;
    height: 2px;
    background: #1e1e1e;
    position: absolute;
    transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

.menu-toggle span:first-child { top: 0; }
.menu-toggle span:last-child { bottom: 0; }

.menu-toggle.active span:first-child {
    transform: translateY(6px);
    opacity: 0;
}

.menu-toggle.active span:last-child {
    transform: translateY(-6px);
    opacity: 0;
}

/* MOBILE OVERLAY */
.mobile-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #fff;
    z-index: 1001;
    display: flex;
    justify-content: center;
    align-items: center;
    transform: translateY(-100%);
    transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
}

.mobile-overlay.active { transform: translateY(0); }

.mobile-nav-list {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 30px;
}

.mobile-nav-list a {
    font-family: 'Montserrat';
    font-size: 28px;
    text-decoration: none;
    color: #1e1e1e;
    font-weight: 700;
}

.mobile-call { color: #0DB14B !important; }

.hero { margin-top: 0; } 

@media (max-width: 1024px) {
    .nav-desktop { display: none; }
    .menu-toggle { display: block; }
}

/* APPLE STYLE CLOSE BUTTON */
.mobile-close {
    position: absolute;
    top: 25px;
    right: 20px;
    width: 28px;
    height: 28px;
    cursor: pointer;
    z-index: 1003;
}

.mobile-close span {
    position: absolute;
    width: 100%;
    height: 2px;
    background: #1e1e1e;
    top: 50%;
    left: 0;
    transform-origin: center;
    transition: all 0.3s ease;
}

.mobile-close span:first-child { transform: rotate(45deg); }
.mobile-close span:last-child { transform: rotate(-45deg); }
.mobile-close:hover span { opacity: 0.6; }

        /* CATALOG CANVAS */
        :root { --card-w: 260px; --card-h: 380px; --gap: 30px; --accent: #25D366; }
        
        /* Исправление "бегающего" экрана */
        body, html { 
            margin: 0; padding: 0; 
            width: 100%; height: 100%; 
            overflow: hidden; 
            font-family: 'Inter', sans-serif;
			background: #fff; 
			color: #1E1E1E;
			padding-bottom: 80px;
			line-height: 1.6;
			
        }
		
		
		.container {
    max-width: 1200px;
    margin: auto;
    padding: 1px 20px;
    /* ИСПРАВЛЕНИЕ: Дополнительная защита контейнера */
    box-sizing: border-box;
}
        
        #viewport { 
            width: 100vw; 
            height: 100vh; 
            position: relative; 
            cursor: grab; 
            touch-action: none; /* Запрещает системный скролл поверх каталога */
        }
        #world { position: absolute; top: 0; left: 0; will-change: transform; }

        .xg_item {
            position: absolute; width: var(--card-w); height: var(--card-h);
            background: #fff; border-radius: 12px; overflow: hidden;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1); opacity: 0;
            border: 1px solid rgba(0,0,0,0.05); transition: border-color 0.3s;
        }
        .xg_item:hover { border-color: var(--accent); }
        .xg_item img { width: 100%; height: 85%; object-fit: cover; pointer-events: none; }
        
        .card-title {
            position: absolute; top: 0; left: 0; width: 100%; height: 85%;
            display: flex; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.2); color: #fff; font-weight: bold;
            font-size: 20px; text-shadow: 1px 1px 5px rgba(0,0,0,0.5);
            pointer-events: none; padding: 10px; text-align: center; box-sizing: border-box;
        }
        .card-footer { height: 15%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 600; color: #333; }

        /* MODAL */
        .xg_modal {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center;
            z-index: 9999; backdrop-filter: blur(5px);
        }
        .xg_modal_content { background: #fff; padding: 20px; border-radius: 20px; text-align: center; max-width: 340px; width: 90%; }
        .xg_modal_content img { width: 100%; border-radius: 10px; margin-bottom: 15px; }
        .xg_btn { padding: 16px; width: 100%; border: none; border-radius: 10px; cursor: pointer; font-size: 16px; font-weight: 600; margin-bottom: 10px; }
        .xg_order { background: var(--accent); color: #fff; }
        .xg_close { background: #eee; color: #666; }

        /* STICKY BOTTOM */
        .sticky { position: fixed; bottom: 0; width: 100%; display: flex; z-index: 999; }
        .sticky a { flex: 1; text-align: center; padding: 15px; color: #fff; text-decoration: none; font-size: 20px; }
        .call { background: #1E1E1E; }
        .wa { background: #0DB14B; }
        @media(min-width: 1024px) { .sticky { display: none; } }
    </style>
</head>
<body>

<header class="header">
						<div class="container header-wrap">
							<div class="logo">
								<a href="./indexru.html"><img src="./img/logotip.png" alt="Жалюзи и Ролл-шторы" class="logo-img"></a>
								<span class="logo-slogan">Стиль в каждом окне</span>
							</div>

							<nav class="nav-desktop">
								<a href="./indexru.html">Главная</a>
								<a href="./aboutru.html">О нас</a>
								<a href="./indexru.html#contact">Контакты</a>
								<a href="tel:+77770356267" class="btn-call">Позвонить</a>
							</nav>

							<div class="menu-toggle" id="menuToggle">
								<span></span>
								<span></span>
							</div>
						</div>
					

						<div class="mobile-overlay" id="mobileMenu">
							   <div class="mobile-close" onclick="toggleMenu()">
									<span></span>
									<span></span>
								</div>
							<nav class="mobile-nav-list">
								<a href="./indexru.html" onclick="toggleMenu()">Главная</a>
								<a href="./aboutru.html" onclick="toggleMenu()">О нас</a>
								<a href="./indexru.html#contact" onclick="toggleMenu()">Контакты</a>
								<a href="tel:+77770356267" class="mobile-call">Позвонить</a>
							</nav>
						</div>
					</header>

<div id="viewport">
    <div id="world"></div>
</div>

<div class="xg_modal" id="xg_modal">
    <div class="xg_modal_content">
        <h3 id="xg_modal_title">Название</h3>
        <img id="xg_modal_img" src="">
        <button class="xg_btn xg_order" id="xg_order_btn">WhatsApp Заказ</button>
        <button class="xg_btn xg_close" onclick="closeModal()">Закрыть</button>
    </div>
</div>

<script>
const CATALOG = [
    { src: "./catalog/2roll.jpg", title: "2-Roll" },
    { src: "./catalog/day_nite.jpg", title: "День-Ночь" },
    { src: "./catalog/duet2.jpg", title: "Дуэт" },
    { src: "./catalog/duet2back.jpg", title: "Дуэт Back" },
    { src: "./catalog/mini_roll.jpg", title: "Мини Ролл" },
    { src: "./catalog/mini_roll_shtor.jpg", title: "Мини Шторы" },
    { src: "./catalog/only_mini_roll.jpg", title: "Классик Ролл" },
    { src: "./catalog/zebra_day_nite.jpg", title: "Зебра" }
];

const world = document.getElementById('world');

const isMobile = window.innerWidth <= 768;
const cardW = isMobile ? window.innerWidth * 0.75 : 260; // Немного уменьшил, чтобы видеть края соседних карт
const cardH = isMobile ? (cardW * 1.4) : 380;
const gap = isMobile ? 20 : 30;

const stepX = cardW + gap;
const stepY = cardH + gap;

const colsCount = isMobile ? 2 : 4; 
const rowsCount = Math.ceil(CATALOG.length / colsCount);
const items = [];

document.documentElement.style.setProperty('--card-w', cardW + 'px');
document.documentElement.style.setProperty('--card-h', cardH + 'px');
document.documentElement.style.setProperty('--gap', gap + 'px');

CATALOG.forEach((data, index) => {
    const r = Math.floor(index / colsCount);
    const c = index % colsCount;

    const el = document.createElement('div');
    el.className = 'xg_item';
    el.innerHTML = `
        <img src="${data.src}">
        <div class="card-title">${data.title}</div>
        <div class="card-footer">Подробнее</div>
    `;
    
    el.addEventListener('click', () => {
        if (isMoving) return;
        openModal(data.src, data.title);
    });

    world.appendChild(el);
    items.push({ el, x: c * stepX, y: r * stepY, src: data.src, title: data.title });
    setTimeout(() => el.style.opacity = "1", index * 50);
});

let worldX = 0, worldY = 0;
let startX, startY, isDragging = false, isMoving = false;

const gridWidth = colsCount * stepX;
const gridHeight = rowsCount * stepY;

function update() {
    items.forEach(item => {
        let realX = item.x + worldX;
        let realY = item.y + worldY;

        if (realX < -stepX) item.x += gridWidth;
        if (realX > window.innerWidth + (gridWidth - window.innerWidth)) item.x -= gridWidth;
        
        if (realY < -stepY) item.y += gridHeight;
        if (realY > window.innerHeight + (gridHeight - window.innerHeight)) item.y -= gridHeight;

        item.el.style.transform = `translate3d(${item.x}px, ${item.y}px, 0)`;
    });
    world.style.transform = `translate3d(${worldX}px, ${worldY}px, 0)`;
}
update();

/* INTERACTION */
const handleStart = (e) => {
    isDragging = true; isMoving = false;
    const t = e.touches ? e.touches[0] : e;
    startX = t.clientX - worldX; startY = t.clientY - worldY;
};

const handleMove = (e) => {
    if (!isDragging) return;
    
    // Блокируем скролл самой страницы браузером во время движения каталога
    if (e.cancelable) e.preventDefault();
    
    isMoving = true;
    const t = e.touches ? e.touches[0] : e;
    worldX = t.clientX - startX; worldY = t.clientY - startY;
    update();
};

const handleEnd = () => { isDragging = false; setTimeout(() => isMoving = false, 50); };

window.addEventListener('mousedown', handleStart);
window.addEventListener('mousemove', handleMove);
window.addEventListener('mouseup', handleEnd);

// Важно: passive: false позволяет e.preventDefault() работать корректно
window.addEventListener('touchstart', handleStart, {passive: false});
window.addEventListener('touchmove', handleMove, {passive: false});
window.addEventListener('touchend', handleEnd);

/* MODAL & WHATSAPP */
let currentOrder = { src: "", title: "" };
function openModal(src, title) {
    currentOrder = { src, title };
    document.getElementById('xg_modal_img').src = src;
    document.getElementById('xg_modal_title').innerText = title;
    document.getElementById('xg_modal').style.display = 'flex';
}
function closeModal() { document.getElementById('xg_modal').style.display = 'none'; }

document.getElementById("xg_order_btn").onclick = function() {
    const phone = "77770356267";
    const imgUrl = window.location.origin + "/" + currentOrder.src.replace("./", "");
    const text = encodeURIComponent(`Здравствуйте! Хочу заказать: *${currentOrder.title}*\nФото: ${imgUrl}`);
    window.open(`https://wa.me/${phone}?text=${text}`, "_blank");
}

// Логика мобильного меню
const menuToggle = document.getElementById('menuToggle');
const mobileMenu = document.getElementById('mobileMenu');

function toggleMenu() {
    menuToggle.classList.toggle('active');
    mobileMenu.classList.toggle('active');
    
    // Блокируем скролл при открытом меню
    if (mobileMenu.classList.contains('active')) {
        document.body.style.overflow = 'hidden';
    } else {
        document.body.style.overflow = '';
    }
}

menuToggle.addEventListener('click', toggleMenu);
</script>

<div class="sticky">
    <a href="tel:+77770356267" class="call">Позвонить</a>
    <a href="https://wa.me/77770356267" class="wa">WhatsApp</a>
</div>

</body>
</html>
