<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Каталог работ</title>
    <style>
	
	
	.header {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 70px;
    background: #ffffff;
    box-shadow: 0 2px 15px rgba(0,0,0,0.05);
    z-index: 1000;
    display: flex;
    align-items: center;
}

.header-wrap {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    padding: 0 20px;
}

.logo {
    display: flex;
    align-items: center;
    gap: 15px;
    text-decoration: none;
}

.logo-img {
    height: 70px;
    width: auto;
    display: block;
}

.logo-img:hover {
    transform: scale(1.05);
}

@media (max-width: 768px) {
    .logo-img {
        height: 60px;
    }
}

.logo strong { font-size: 20px; font-family: 'Montserrat'; }
.logo-slogan {
    font-size: 20px;
    color: #0c5b71;
    line-height: 1.2;
    max-width: 250px;
}

@media (max-width: 768px) {
    .logo {
        gap: 8px;
    }
    .logo-slogan {
        font-size: 18px;
        display: block;
    }
}

/* DESKTOP NAV */
.nav-desktop { display: flex; align-items: center; gap: 25px; }
.nav-desktop a {
    text-decoration: none;
    color: #1E1E1E;
    font-weight: 500;
    font-size: 14px;
    transition: 0.3s;
}
.nav-desktop a:hover { color: #0DB14B; }

.btn-call {
    background: #1E1E1E;
    color: #fff !important;
    padding: 8px 18px;
    border-radius: 20px;
    font-size: 13px !important;
}

/* MOBILE TOGGLE (HAMBURGER) */
.menu-toggle {
    display: none;
    width: 30px;
    height: 20px;
    position: relative;
    cursor: pointer;
    z-index: 1002;
}

.menu-toggle span {
    display: block;
    width: 100%;
    height: 2px;
    background: #1e1e1e;
    position: absolute;
    transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

.menu-toggle span:first-child { top: 0; }
.menu-toggle span:last-child { bottom: 0; }

.menu-toggle.active span:first-child {
    transform: translateY(6px);
    opacity: 0;
}

.menu-toggle.active span:last-child {
    transform: translateY(-6px);
    opacity: 0;
}

/* MOBILE OVERLAY */
.mobile-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #fff;
    z-index: 1001;
    display: flex;
    justify-content: center;
    align-items: center;
    transform: translateY(-100%);
    transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
}

.mobile-overlay.active { transform: translateY(0); }

.mobile-nav-list {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 30px;
}

.mobile-nav-list a {
    font-family: 'Montserrat';
    font-size: 28px;
    text-decoration: none;
    color: #1e1e1e;
    font-weight: 700;
}

.mobile-call { color: #0DB14B !important; }

.hero { margin-top: 0; } 

@media (max-width: 1024px) {
    .nav-desktop { display: none; }
    .menu-toggle { display: block; }
}

/* APPLE STYLE CLOSE BUTTON */
.mobile-close {
    position: absolute;
    top: 25px;
    right: 20px;
    width: 28px;
    height: 28px;
    cursor: pointer;
    z-index: 1003;
}

.mobile-close span {
    position: absolute;
    width: 100%;
    height: 2px;
    background: #1e1e1e;
    top: 50%;
    left: 0;
    transform-origin: center;
    transition: all 0.3s ease;
}

.mobile-close span:first-child { transform: rotate(45deg); }
.mobile-close span:last-child { transform: rotate(-45deg); }
.mobile-close:hover span { opacity: 0.6; }
	
	
	
        :root {
            --card-w: 260px;
            --card-h: 380px;
            --gap: 30px;
            --accent: #25D366;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background: #fff;
            font-family: 'Segoe UI', sans-serif;
        }

        #viewport {
            width: 100vw;
            height: 100vh;
            position: relative;
            cursor: grab;
            overflow: hidden;
        }

        #viewport:active { cursor: grabbing; }

        #world {
            position: absolute;
            top: 0; left: 0;
            will-change: transform;
        }

        .xg_item {
            position: absolute;
            width: var(--card-w);
            height: var(--card-h);
            background: #111;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: opacity 0.5s ease, border-color 0.3s;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .xg_item:hover {
            border-color: var(--accent);
            z-index: 10;
        }

        .xg_item img {
            width: 100%; height: 100%;
            object-fit: cover;
            pointer-events: none;
        }

        /* МОДАЛКА */
        .xg_modal {
            position: fixed;
            top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.9);
            display: none; align-items: center; justify-content: center;
            z-index: 9999; backdrop-filter: blur(10px);
        }

        .xg_modal_content {
            background: #1a1e26; padding: 25px; border-radius: 20px;
            text-align: center; max-width: 340px; width: 90%;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .xg_modal_content img { width: 100%; border-radius: 10px; margin-bottom: 20px; }

        .xg_btn {
            padding: 16px; width: 100%; border: none; border-radius: 10px;
            cursor: pointer; font-size: 16px; font-weight: 600; margin-bottom: 10px;
        }
        .xg_order { background: var(--accent); color: #fff; }
        .xg_close { background: #333; color: #ccc; }
		
		/* STICKY BUTTONS */
.sticky {
    position: fixed;
    bottom: 0;
    width: 100%;
    display: flex;
    z-index: 999;
    left: 0;
}

.sticky a {
    flex: 1;
    text-align: center;
    padding: 15px;
    color: #fff;
    text-decoration: none;
    font-size: 20px;
}

.call { background: #1E1E1E; }
.wa { background: #0DB14B; }
    </style>
	
/* DESKTOP STICKY */
@media(min-width: 1024px) {
    .sticky {
        display: none;
    }
    
}	
	
</head>
<body>


<header class="header">
						<div class="container header-wrap">
							<div class="logo">
								<a href="/"><img src="./img/logotip.png" alt="Жалюзи и Ролл-шторы" class="logo-img"></a>
								<span class="logo-slogan">Стиль в каждом окне</span>
							</div>

							<nav class="nav-desktop">
								<a href="#quiz">Подбор дизайна</a>
								<a href="#gallery">Галерея</a>
								<a href="#contact">Контакты</a>
								<a href="tel:+77000000000" class="btn-call">Позвонить</a>
							</nav>

							<div class="menu-toggle" id="menuToggle">
								<span></span>
								<span></span>
							</div>
						</div>
					

						<div class="mobile-overlay" id="mobileMenu">
							   <div class="mobile-close" onclick="toggleMenu()">
									<span></span>
									<span></span>
								</div>
							<nav class="mobile-nav-list">
								<a href="#quiz" onclick="toggleMenu()">Подбор дизайна</a>
								<a href="#gallery" onclick="toggleMenu()">Галерея</a>
								<a href="#contact" onclick="toggleMenu()">Контакты</a>
								<a href="tel:+77000000000" class="mobile-call">Позвонить</a>
							</nav>
						</div>
					</header>


<div id="viewport">
    <div id="world"></div>
</div>

<div class="xg_modal" id="xg_modal">
    <div class="xg_modal_content">
        <img id="xg_modal_img" src="">
        <button class="xg_btn xg_order" id="xg_order_btn">WhatsApp Заказ</button>
        <button class="xg_btn xg_close" onclick="closeModal()">Закрыть</button>
    </div>
</div>

<script>
// Добавляйте сюда столько картинок, сколько нужно
const IMAGES = [
    "https://images.unsplash.com/photo-1582582429416-8a5d3c4a3d10?w=500",
    "https://images.unsplash.com/photo-1600585154340-be6161a56a0c?w=500",
    "https://images.unsplash.com/photo-1598300053653-8a77e0f0a8c2?w=500",
    "https://images.unsplash.com/photo-1616627456487-7d46f0c1e9f1?w=500",
    "https://images.unsplash.com/photo-1595526114035-0d45ed16cfbf?w=500",
    "https://images.unsplash.com/photo-1615874959474-d609969a20ed?w=500",
    "https://images.unsplash.com/photo-1586023492125-27b2c045efd7?w=500",
    "https://images.unsplash.com/photo-1524758631624-e2822e304c36?w=500"
];

const world = document.getElementById('world');
const cardW = 260, cardH = 380, gap = 30;
const stepX = cardW + gap, stepY = cardH + gap;

// Определяем оптимальное количество колонок на основе количества картинок
// (Например, делаем сетку шириной в 3 колонки, высота выстроится автоматически)
const colsCount = 5;
const rowsCount = Math.ceil(IMAGES.length / colsCount);

const items = [];

// Создаем карточки строго по списку
IMAGES.forEach((src, index) => {
    const r = Math.floor(index / colsCount);
    const c = index % colsCount;

    const el = document.createElement('div');
    el.className = 'xg_item';
    const img = document.createElement('img');
    img.src = src;
    el.appendChild(img);
    
    el.addEventListener('click', () => {
        if (isMoving) return;
        openModal(src);
    });

    world.appendChild(el);
    const item = { el, x: c * stepX, y: r * stepY, src: src };
    items.push(item);
    
    // Плавное появление
    setTimeout(() => el.style.opacity = "1", index * 50);
});

let worldX = 0, worldY = 0;
let startX, startY, isDragging = false, isMoving = false;

// Размеры всей области сетки
const gridWidth = colsCount * stepX;
const gridHeight = rowsCount * stepY;

function update() {
    items.forEach(item => {
        let realX = item.x + worldX;
        let realY = item.y + worldY;

        // Бесконечный перенос по горизонтали
        if (realX < -stepX) item.x += gridWidth;
        if (realX > window.innerWidth + (gridWidth - window.innerWidth)) item.x -= gridWidth;

        // Бесконечный перенос по вертикали
        if (realY < -stepY) item.y += gridHeight;
        if (realY > window.innerHeight + (gridHeight - window.innerHeight)) item.y -= gridHeight;

        item.el.style.transform = `translate3d(${item.x}px, ${item.y}px, 0)`;
    });
    world.style.transform = `translate3d(${worldX}px, ${worldY}px, 0)`;
}

// Запуск начальной позиции
update();

/* === УПРАВЛЕНИЕ === */
const handleStart = (e) => {
    isDragging = true;
    isMoving = false;
    const t = e.touches ? e.touches[0] : e;
    startX = t.clientX - worldX;
    startY = t.clientY - worldY;
};

const handleMove = (e) => {
    if (!isDragging) return;
    isMoving = true;
    const t = e.touches ? e.touches[0] : e;
    worldX = t.clientX - startX;
    worldY = t.clientY - startY;
    update();
};

const handleEnd = () => {
    isDragging = false;
    setTimeout(() => isMoving = false, 50);
};

window.addEventListener('mousedown', handleStart);
window.addEventListener('mousemove', handleMove);
window.addEventListener('mouseup', handleEnd);
window.addEventListener('touchstart', handleStart, {passive: false});
window.addEventListener('touchmove', handleMove, {passive: false});
window.addEventListener('touchend', handleEnd);

/* === МОДАЛКА === */
let currentImgSrc = "";
function openModal(src) {
    currentImgSrc = src;
    document.getElementById('xg_modal_img').src = src;
    document.getElementById('xg_modal').style.display = 'flex';
}
function closeModal() {
    document.getElementById('xg_modal').style.display = 'none';
}
document.getElementById("xg_order_btn").onclick = function(){
    let phone = "77000000000"; 
    let text = encodeURIComponent("Здравствуйте! Хочу заказать: " + currentImgSrc);
    window.open(`https://wa.me/${phone}?text=${text}`, "_blank");
}


// Логика мобильного меню
const menuToggle = document.getElementById('menuToggle');
const mobileMenu = document.getElementById('mobileMenu');

function toggleMenu() {
    menuToggle.classList.toggle('active');
    mobileMenu.classList.toggle('active');
    
    // Блокируем скролл при открытом меню
    if (mobileMenu.classList.contains('active')) {
        document.body.style.overflow = 'hidden';
    } else {
        document.body.style.overflow = '';
    }
}

menuToggle.addEventListener('click', toggleMenu);




</script>

<div class="sticky">
        <a href="tel:+77000000000" class="call">📞</a>
        <a href="https://wa.me/77000000000" class="wa">💬</a>
    </div>
</body>
</html>
