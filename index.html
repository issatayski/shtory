<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ролл-шторы</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600&family=Inter&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
}

/* HERO */
.hero {
  background: #f5f5f5;
  padding: 60px 20px;
  text-align: center;
}

.hero h1 {
  font-family: 'Montserrat';
  font-size: 32px;
}

.btn {
  background: #0DB14B;
  color: #fff;
  padding: 15px 25px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

/* QUIZ */
.quiz-modal {
  display: none;
  position: fixed;
  z-index: 9999;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  justify-content: center;
  align-items: center;
}

.quiz-box {
  background: #fff;
  padding: 25px;
  border-radius: 12px;
  width: 90%;
  max-width: 400px;
}

.quiz-step { display:none; }
.quiz-step.active { display:block; }

.quiz-box button {
  width: 100%;
  margin-top: 10px;
  padding: 12px;
  background: #0DB14B;
  color: #fff;
  border: none;
  border-radius: 8px;
}

/* CONTACTS */
.contacts {
  padding: 40px 20px;
  display: flex;
  flex-wrap: wrap;
  gap: 20px;
}

.contacts div {
  flex: 1;
}

/* SOCIALS */
.socials a {
  margin-right: 15px;
  font-size: 20px;
  text-decoration: none;
  color: #333;
}

/* MOBILE BUTTONS */
.mobile-buttons {
  display: none;
}

@media(max-width:768px){
  .mobile-buttons {
    display: flex;
    position: fixed;
    bottom: 0;
    width: 100%;
  }

  .mobile-buttons a {
    flex:1;
    text-align:center;
    padding:15px;
    color:#fff;
    text-decoration:none;
  }

  .mobile-buttons a:first-child {
    background:#1e1e1e;
  }

  .mobile-buttons a:last-child {
    background:#0DB14B;
  }
}
</style>

</head>
<body>

<!-- HERO -->
<section class="hero">
  <h1>Ролл-шторы на заказ</h1>
  <p>Замер бесплатно • Установка за 2 дня</p>
  <button class="btn" onclick="openQuiz()">Получить расчет</button>
</section>

<!-- QUIZ -->
<div id="quizModal" class="quiz-modal">
  <div class="quiz-box">
    <span onclick="closeQuiz()" style="cursor:pointer">✖</span>

    <div class="quiz-step active">
      <h3>Где нужны шторы?</h3>
      <button onclick="nextStep('Квартира')">Квартира</button>
      <button onclick="nextStep('Дом')">Дом</button>
      <button onclick="nextStep('Офис')">Офис</button>
    </div>

    <div class="quiz-step">
      <h3>Тип?</h3>
      <button onclick="nextStep('Ролл')">Ролл</button>
      <button onclick="nextStep('День-ночь')">День-ночь</button>
    </div>

    <div class="quiz-step">
      <h3>Размер?</h3>
      <button onclick="nextStep('Маленькое')">Маленькое</button>
      <button onclick="nextStep('Большое')">Большое</button>
    </div>

    <div class="quiz-step">
      <h3>Ваш телефон</h3>
      <input id="phone" placeholder="+7..." style="width:100%;padding:10px;">
      <button onclick="sendQuiz()">Отправить</button>
    </div>

  </div>
</div>

<!-- CONTACTS -->
<section class="contacts">
  <div>
    <h2>Контакты</h2>
    <p>Телефон: +7 777 000 00 00</p>
    <p>WhatsApp: +7 777 000 00 00</p>
    <p>г. Алматы</p>

    <div class="socials">
      <a href="#">Instagram</a>
      <a href="#">TikTok</a>
      <a href="#">Facebook</a>
    </div>
  </div>

  <div>
    <iframe src="https://widgets.2gis.com/widget?type=firm&id=70000001000000000"
      width="100%" height="300"></iframe>
  </div>
</section>

<!-- MOBILE -->
<div class="mobile-buttons">
  <a href="tel:+77770000000">Позвонить</a>
  <a href="https://wa.me/77770000000">WhatsApp</a>
</div>

<script>
let step = 0;
let answers = [];

function openQuiz(){
  document.getElementById('quizModal').style.display='flex';
}

function closeQuiz(){
  document.getElementById('quizModal').style.display='none';
}

function nextStep(ans){
  answers.push(ans);
  let steps = document.querySelectorAll('.quiz-step');
  steps[step].classList.remove('active');
  step++;
  if(steps[step]) steps[step].classList.add('active');
}

function sendQuiz(){
  let phone = document.getElementById('phone').value;

  if(!phone || phone.length < 10){
    alert("Введите номер");
    return;
  }

  let text = `Заявка:
${answers.join(', ')}
Телефон: ${phone}`;

  window.open("https://wa.me/77770000000?text=" + encodeURIComponent(text));
}
</script>

</body>
</html>
